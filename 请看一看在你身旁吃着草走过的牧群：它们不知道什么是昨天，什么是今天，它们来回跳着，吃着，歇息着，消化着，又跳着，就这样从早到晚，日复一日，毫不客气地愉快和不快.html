<p class="p2"><span class="s1">请看一看在你身旁吃着草走过的牧群：它们不知道什么是昨天，什么是今天，它们来回跳着，吃着，歇息着，消化着，又跳着，就这样从早到晚，日复一日，毫不客气地愉快和不快，亦即对眼前事物的愉快和不快，因而既不忧郁也不厌烦。</span></p>
<p class="p3"><br /></p>
<p class="p2"><span class="s1">-不和时宜的沉思 第二篇 第一节</span></p>
